name: Keep Actions Alive

on:
  schedule:
    # 每 30 天跑一次，防止 GitHub 因 60 天无活动自动禁用 Actions
    - cron: '0 0 1 * *'
    - cron: '0 0 15 * *'
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Touch to keep alive
        run: |
          echo "Last keepalive: $(date -u)" > .keepalive
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .keepalive
          git diff --cached --quiet || git commit -m "chore: keepalive $(date -u +%Y-%m-%d)"
          git push
