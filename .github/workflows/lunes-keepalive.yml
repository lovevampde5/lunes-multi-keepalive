name: Lunes Host Multi-Account KeepAlive

on:
  push:
    branches: [main]
  schedule:
    - cron: '30 8 * * *'
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb
          npm install
          npx playwright install-deps chrome

      - name: Set up WARP
        uses: fscarmen/warp-on-actions@v1.4
        with:
          mode: client
          stack: dual

      - name: Configure WARP Proxy
        run: |
          echo "=== 1. 断开 WARP ==="
          sudo warp-cli --accept-tos disconnect || true
          sleep 3

          echo "=== 2. 切换 SOCKS5 模式 ==="
          sudo warp-cli --accept-tos mode proxy || sudo warp-cli --accept-tos set-mode proxy || true

          echo "=== 3. 设定代理端口 40000 ==="
          sudo warp-cli --accept-tos proxy port 40000 || sudo warp-cli --accept-tos set-proxy-port 40000 || true

          echo "=== 4. 连接 WARP ==="
          sudo warp-cli --accept-tos connect || true
          sleep 5

          echo "=== 5. 网络诊断 ==="
          curl --connect-timeout 5 https://ifconfig.me || echo "❌ 网络异常"

          echo "=== 6. 代理诊断 ==="
          curl -I --connect-timeout 5 --socks5-hostname 127.0.0.1:40000 https://cloudflare.com/cdn-cgi/trace || echo "❌ WARP 代理异常"

      - name: Run Renew Script
        env:
          USERS_JSON: ${{ secrets.USERS_JSON }}
          LUNES_SERVER_URL: ${{ secrets.LUNES_SERVER_URL }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x720x24" node action_renew.js

      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lunes-screenshots
          path: screenshots/
